services:
  - type: web
    name: one421-foundation-ai-final-project
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://1421-foundation-ai-final-project.vercel.app
      - key: PYTHON_VERSION
        value: 3.11.9
    headers:
      - path: /*
        name: Access-Control-Allow-Origin
        value: https://1421-foundation-ai-final-project.vercel.app
      - path: /*
        name: Access-Control-Allow-Credentials
        value: "true"
      - path: /*
        name: Access-Control-Allow-Methods
        value: GET, POST, OPTIONS
      - path: /*
        name: Access-Control-Allow-Headers
        value: Content-Type